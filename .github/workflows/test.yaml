name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test ./... -count=1

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Start Podman socket
        run: |
          systemctl --user start podman.socket
          echo "DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock" >> "$GITHUB_ENV"

      - name: Pull test images
        run: |
          podman pull quay.io/podman/stable:latest

      - name: Build provider
        run: go build -o terraform-provider-podman .

      - name: Run acceptance tests
        run: |
          TF_ACC=1 go test ./internal/provider/ -v -count=1 -timeout 30m \
            -run "TestAccPodmanContainer_|TestAccPodmanImage_|TestAccPodmanNetwork_|TestAccPodmanVolume_|TestAccPodmanTag_|TestAccPodmanSecret_|TestAccDataSource"
        env:
          DOCKER_HOST: ${{ env.DOCKER_HOST }}
